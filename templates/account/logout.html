{% extends "base.html" %}

{% block title %}Log Out - Motor Match{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-8 col-lg-5">
            <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
                <div class="mb-3">
                    <div class="rounded-circle bg-danger bg-opacity-10 d-flex align-items-center justify-content-center mx-auto mb-3" style="width:64px;height:64px;">
                        <i class="bi bi-box-arrow-right text-danger fs-2"></i>
                    </div>
                    <h4 class="fw-bold mb-1">Log Out</h4>
                    <p class="text-muted small">Are you sure you want to log out of Motor Match?</p>
                </div>

                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 fw-semibold mb-2">
                        <i class="bi bi-box-arrow-right me-1"></i> Yes, Log Me Out
                    </button>
                </form>

                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100">
                    Cancel
                </a>

                <p class="text-muted mt-3 mb-0" style="font-size:.75rem;">
                    You'll be redirected to the homepage after logging out.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
