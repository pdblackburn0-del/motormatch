{% load static %}
<link rel="stylesheet" href="{% static 'css/components/cookie_banner.css' %}">

<div id="cookieBanner" class="cookie-banner" style="display:none;">
    <div class="cookie-banner-inner">
        <div class="cookie-banner-text">
            <i class="bi bi-cookie me-2" style="color:#f59e0b;font-size:1.1rem;"></i>
            <span>We use cookies to improve your experience, remember your preferences, and analyse site traffic. By using Motor Match, you agree to our
            <a href="{% url 'privacy' %}" class="cookie-link">Privacy Policy</a> and
            <a href="{% url 'terms' %}" class="cookie-link">Terms</a>.</span>
        </div>
        <div class="cookie-banner-actions">
            <button id="cookieDecline" class="cookie-btn-decline">Decline optional</button>
            <button id="cookieAccept" class="cookie-btn-accept">Accept all</button>
        </div>
    </div>
</div>

<script src="{% static 'js/components/cookie_banner.js' %}"></script>
