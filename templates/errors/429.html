{% extends 'base.html' %}
{% block title %}Slow Down — Motor Match{% endblock %}
{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height:60vh;">
    <div class="mb-4" style="font-size:5rem;line-height:1;">⏱️</div>
    <h1 class="mb-2" style="font-size:4rem;font-weight:900;color:#111827;">429</h1>
    <h2 class="fw-semibold mb-3" style="color:#374151;">Easy on the accelerator.</h2>
    <p class="text-muted mb-4" style="max-width:420px;">
        You've made too many requests in a short space of time.
        Take a breather and try again in a moment.
    </p>
    <div class="d-flex gap-3 flex-wrap justify-content-center">
        <a href="{% url 'home' %}" class="btn px-4 py-2 fw-600 text-white" style="background:#4f46e5;border-radius:10px;border:none;">
            <i class="bi bi-house-fill me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
