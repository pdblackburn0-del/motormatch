<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Motor Match</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; }
        .hero-side {
            background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=900') center/cover no-repeat;
            position: relative;
        }
        .hero-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 18, 40, 0.65);
        }
        .hero-side .content { position: relative; z-index: 1; }
        .form-control { background: #f8f9fa; border: 1px solid #e2e8f0; }
        .form-control:focus { background: #fff; box-shadow: 0 0 0 3px rgba(13,110,253,.12); }
        .btn-google { border: 1px solid #e2e8f0; background: #fff; color: #1a1a2e; font-weight: 500; }
        .btn-google:hover { background: #f8f9fa; }
        footer { border-top: 1px solid #e9ecef; background: #fff; }
    </style>
</head>
<body class="d-flex flex-column" style="min-height:100vh;">

<div class="d-flex flex-grow-1">

    <div class="hero-side d-none d-md-flex flex-column justify-content-between p-5 text-white" style="width:48%;">
        <a href="/" class="d-flex align-items-center gap-2 text-decoration-none text-white">
            <i class="bi bi-car-front-fill fs-5"></i>
            <span class="fw-bold" style="font-size:1.05rem;">Motor Match</span>
        </a>
        <div class="content pb-4">
            <h1 class="fw-bold lh-sm mb-3" style="font-size:2.2rem;">Find the drive of<br>your life.</h1>
            <p class="text-white-50 mb-0">Join thousands of car enthusiasts<br>and find your perfect match today.</p>
        </div>
    </div>

    <div class="d-flex flex-column justify-content-center align-items-center p-4 p-md-5 bg-white flex-grow-1">
        <div style="width:100%; max-width:380px;">

            <h2 class="fw-bold mb-1">Welcome back</h2>
            <p class="text-primary small mb-4">Please enter your details to sign in.</p>

            <button class="btn btn-google w-100 mb-3 d-flex align-items-center justify-content-center gap-2">
                <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google">
                Log in with Google
            </button>

            <div class="d-flex align-items-center gap-3 mb-3">
                <hr class="flex-grow-1 m-0">
                <span class="text-muted small">OR</span>
                <hr class="flex-grow-1 m-0">
            </div>

            <form>
                <div class="mb-3">
                    <label class="form-label small fw-medium">Email Address</label>
                    <input type="email" class="form-control py-2" placeholder="name@example.com">
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-medium">Password</label>
                    <input type="password" class="form-control py-2" placeholder="Enter your password">
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label small text-muted">Remember me</label>
                    </div>
                    <a href="#" class="text-primary text-decoration-none small fw-semibold">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">Log In</button>
            </form>

            <p class="text-center text-muted mt-3 small">Don't have an account? <a href="/register/" class="text-primary fw-semibold text-decoration-none">Sign Up</a></p>

        </div>
    </div>

</div>

<footer class="py-3 px-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span class="text-muted small">&copy; 2024 Motor Match Inc. All rights reserved.</span>
        <div class="d-flex gap-3">
            <a href="#" class="text-muted text-decoration-none small">Privacy</a>
            <a href="#" class="text-muted text-decoration-none small">Terms</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
