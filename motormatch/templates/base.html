<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Motor Match{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { border-bottom: 1px solid #e9ecef; }
        .navbar-brand { font-weight: 700; color: #1a1a2e !important; font-size: 1.1rem; }
        .navbar-brand .brand-icon { color: #0d6efd; }
        .nav-link { color: #4a4a4a !important; font-size: 0.9rem; }
        .nav-link:hover { color: #0d6efd !important; }
        footer a:hover { color: #0d6efd !important; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-car-front-fill brand-icon fs-5"></i> Motor Match
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            {% block nav_links %}
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-1">
                <li class="nav-item"><a class="nav-link px-3" href="#">Buy</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/sell/">Sell</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/compare/">Compare</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/saved/">Saved</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2 ms-3">
                <a href="/login/" class="btn btn-outline-secondary btn-sm px-3">Log In</a>
                <a href="/register/" class="btn btn-primary btn-sm px-3">Sign Up</a>
            </div>
            {% endblock %}
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="bg-white border-top mt-5 py-4">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-car-front-fill text-primary"></i>
                <span class="fw-semibold small">Motor Match</span>
            </div>
            <div class="d-flex gap-4">
                <a href="#" class="text-muted text-decoration-none small">About</a>
                <a href="#" class="text-muted text-decoration-none small">Privacy</a>
                <a href="#" class="text-muted text-decoration-none small">Terms</a>
                <a href="#" class="text-muted text-decoration-none small">Support</a>
            </div>
            <span class="text-muted small">&copy; 2024 Motor Match Inc. All rights reserved.</span>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
